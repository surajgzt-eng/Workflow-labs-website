<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  width: 1080px; height: 1080px; 
  display: flex; align-items: center; justify-content: center;
  background: #f8f7ff;
}
svg { width: 1080px !important; height: 1080px !important; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="1080" height="1080">
  <defs>
    <linearGradient id="gP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f7ff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#4f46e5" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="url(#bgGrad)"/>

  <!-- Icon circle bg -->
  <circle cx="200" cy="160" r="85" fill="white" filter="url(#shadow)"/>

  <!-- Branching node icon -->
  <g transform="translate(200, 160)" fill="none" stroke="url(#gP)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <line x1="0" y1="0" x2="0" y2="-48"/>
    <line x1="0" y1="-32" x2="-14" y2="-18"/>
    <line x1="0" y1="-32" x2="14" y2="-18"/>
    <line x1="0" y1="0" x2="-35" y2="38"/>
    <line x1="0" y1="0" x2="35" y2="38"/>
    <circle cx="0" cy="0" r="10" fill="url(#gP)" stroke="none"/>
    <circle cx="-35" cy="38" r="9" fill="url(#gP)" stroke="none"/>
    <circle cx="35" cy="38" r="9" fill="url(#gP)" stroke="none"/>
  </g>

  <!-- Text: Workflow -->
  <text x="200" y="290" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="52" fill="#1e293b" text-anchor="middle" letter-spacing="-1">Workflow</text>

  <!-- Text: Labs -->
  <text x="200" y="340" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="28" fill="#6366f1" text-anchor="middle" letter-spacing="0.5em">LABS</text>

  <!-- Subtle underline accent -->
  <rect x="140" y="355" width="120" height="3" rx="2" fill="url(#gP)" opacity="0.5"/>
</svg>
</body>
</html>
