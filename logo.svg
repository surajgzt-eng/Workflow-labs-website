<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" width="360" height="100">
  <defs>
    <linearGradient id="gP" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <g transform="translate(12, 12)">
    <rect x="0" y="0" width="76" height="76" rx="16" fill="none"/>
    <g transform="translate(38, 38)" fill="none" stroke="url(#gP)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
      <!-- Vertical stem goes all the way to arrow tip -->
      <line x1="0" y1="0" x2="0" y2="-28"/>
      <!-- Left arrow wing -->
      <line x1="0" y1="-22" x2="-9" y2="-14"/>
      <!-- Right arrow wing -->
      <line x1="0" y1="-22" x2="9" y2="-14"/>
      <!-- Left branch from center -->
      <line x1="0" y1="0" x2="-17" y2="21"/>
      <!-- Right branch from center -->
      <line x1="0" y1="0" x2="17" y2="21"/>
      <!-- Left node -->
      <circle cx="-17" cy="21" r="3.8" fill="url(#gP)" stroke="none"/>
      <!-- Right node -->
      <circle cx="17" cy="21" r="3.8" fill="url(#gP)" stroke="none"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="104" y="38" font-family="'Inter',-apple-system,BlinkMacSystemFont,sans-serif" font-weight="800" font-size="30" fill="#1e293b" letter-spacing="-0.02em">Workflow</text>
  <text x="104" y="66" font-family="'Inter',-apple-system,BlinkMacSystemFont,sans-serif" font-weight="600" font-size="15" fill="#6366f1" letter-spacing="0.35em">LABS</text>
</svg>
