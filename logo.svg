<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <defs>
    <linearGradient id="gP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Icon: branching node on subtle purple bg -->
  <rect x="0" y="4" width="56" height="56" rx="14" fill="#eef2ff"/>
  <g transform="translate(28, 32)" fill="none" stroke="url(#gP)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Up arrow -->
    <line x1="0" y1="0" x2="0" y2="-18"/>
    <line x1="0" y1="-12" x2="-7" y2="-6"/>
    <line x1="0" y1="-12" x2="7" y2="-6"/>
    <!-- Left branch -->
    <line x1="0" y1="0" x2="-13" y2="14"/>
    <!-- Right branch -->
    <line x1="0" y1="0" x2="13" y2="14"/>
    <!-- Nodes -->
    <circle cx="0" cy="0" r="3.2" fill="url(#gP)" stroke="none"/>
    <circle cx="-13" cy="14" r="2.8" fill="url(#gP)" stroke="none"/>
    <circle cx="13" cy="14" r="2.8" fill="url(#gP)" stroke="none"/>
  </g>

  <!-- Wordmark -->
  <text x="68" y="30" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-weight="800" font-size="26" fill="#1e293b" letter-spacing="-0.02em">Workflow</text>
  <text x="68" y="52" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-weight="700" font-size="12" fill="#6366f1" letter-spacing="0.3em">LABS</text>
</svg>