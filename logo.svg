<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="gLogo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Icon: Flowing W mark - represents workflow/automation flow -->
  <g transform="translate(10, 10)">
    <!-- Outer rounded square -->
    <rect x="0" y="0" width="80" height="80" rx="18" fill="url(#gLogo)"/>
    
    <!-- White W with flow arrow -->
    <path d="M20 55 L30 25 L40 45 L50 25 L60 55" 
          fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Flow arrow (the automation concept) -->
    <path d="M58 52 L65 58 L58 64" 
          fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Small accent dot -->
    <circle cx="62" cy="50" r="3" fill="#a78bfa"/>
  </g>

  <!-- Wordmark -->
  <text x="108" y="42" font-family="'Inter',-apple-system,BlinkMacSystemFont,sans-serif" font-weight="700" font-size="28" fill="#1a1a2e" letter-spacing="-0.02em">Workflow</text>
  <text x="108" y="72" font-family="'Inter',-apple-system,BlinkMacSystemFont,sans-serif" font-weight="600" font-size="14" fill="#6366f1" letter-spacing="0.35em">LABS</text>
</svg>
